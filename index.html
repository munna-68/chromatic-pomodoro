        <button class="settings-btn" id="settings-btn" aria-label="Settings">
          <img src="icons/settings-logo.svg" alt="Settings Icon" />
        </button>
      </header>

      <main class="main-container">
        <div class="timer-card">
          <div class="timer-tabs">
            <button class="tab active" data-mode="pomodoro">Pomodoro</button>
            <button class="tab" data-mode="short-break">Short Break</button>
            <button class="tab" data-mode="long-break">Long Break</button>
          </div>

          <div class="timer-display">
            <h1 id="time">25:00</h1>
          </div>

          <div class="timer-controls">
            <button class="btn-primary" id="start-btn">START</button>
            <div class="active-controls hidden">
              <button class="btn-icon" id="toggle-btn">
                <img src="icons/pause-logo.svg" alt="Pause" id="toggle-icon" />
              </button>
              <button class="btn-primary" id="reset-btn">RESET</button>
            </div>
          </div>
        </div>
      </main>

      <div class="modal-overlay hidden" id="settings-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h2>SETTINGS</h2>
            <button
              class="close-btn"
              id="close-btn"
              aria-label="Close Settings"
            >
              <img src="./icons/cross-icon.svg" alt="cross btn" />
            </button>
          </div>

          <div class="modal-body">
            <div class="settings-section">
              <p class="section-label">Change Duration:</p>
              <div class="duration-tabs">
                <button class="tab active" data-setting="pomodoro">
                  Pomodoro
                </button>
                <button class="tab" data-setting="short-break">
                  Short Break
                </button>
                <button class="tab" data-setting="long-break">
                  Long Break
                </button>
              </div>
            </div>

            <div class="settings-section duration-slider-section">
              <div class="slider-header">
                <label for="duration-slider" class="section-label"
                  >Duration</label
                >
                <div class="duration-display">
                  <button
                    class="reset-button"
                    id="settings-reset-btn"
                    type="button"
                    aria-label="Reset duration"
                  >
                    <img src="icons/reset-logo.svg" alt="" aria-hidden="true" />
                  </button>
                  <span id="duration-value">25 min</span>
                </div>
              </div>
              <input
                type="range"
                id="duration-slider"
                min="5"
                max="99"
                value="25"
                class="slider"
              />
            </div>

            <div class="settings-section theme-section">
              <p class="section-label">Change Theme:</p>
              <div class="theme-controls">
                <div class="theme-options">
                  <button
                    class="theme-btn"
                    data-theme="dark"
                    aria-label="Dark Theme"
                  ></button>
                  <button
                    class="theme-btn active"
                    data-theme="light"
                    aria-label="Light Theme"
                  ></button>
                  <button
                    class="theme-btn"
                    data-theme="red"
                    aria-label="Red Theme"
                  ></button>
                </div>
                <button class="btn-primary save-btn" type="button">SAVE</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
